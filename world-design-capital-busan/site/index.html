        --color-toggle-border: #d7fff5;
        --color-menu-item--hover: #9ff2df;
      }

      .frame {
        text-shadow: 0 1px 18px rgb(0 0 0 / 55%);
      }

      .frame__title {
        max-width: 42rem;
        line-height: 1.1;
      }

      .frame__links {
        flex-wrap: wrap;
      }

      .title {
        letter-spacing: 0;
      }

      .menu {
        background: rgb(3 13 13 / 78%);
        align-content: center;
        gap: clamp(0.45rem, 1.2vh, 0.85rem);
        overflow-y: auto;
        padding: clamp(4.5rem, 10vh, 7rem) 1.5rem 2rem;
      }

      .menu__item {
        align-items: baseline;
        display: flex;
        font-size: clamp(1.6rem, 4.1vw, 3.3rem);
        gap: 0.45rem;
        justify-content: center;
        line-height: 0.92;
        text-align: center;
      }

      .menu__item small {
        display: inline-block;
        font-size: clamp(0.75rem, 1.3vw, 1.05rem);
        line-height: 1.1;
        max-width: min(31vw, 22rem);
        opacity: 0.72;
        text-align: left;
        white-space: normal;
      }

      .menu__item::before,
      .menu__item::after {
        flex: 0 0 auto;
      }

      @media (max-width: 52.99em) {
        .frame__credits {
          max-width: 25rem;
        }
      }
